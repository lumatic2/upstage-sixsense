<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>한입지도 — 예산 안에서 오늘 뭘 먹지</title>
<meta name="description" content="예산을 말하면 학식과 명륜동·혜화 식당을 한 판에 놓고 골라주는 서비스">
<style>
/* ── tokens (DESIGN.md "Minimal" SSOT 파생 — 발명 리터럴 금지) ── */
:root{
  --surface-base:oklch(99% 0 0);
  --surface-muted:oklch(97% 0 0);
  --text-default:oklch(12% 0 0);
  --text-muted:oklch(30% 0 0);
  --action-primary:oklch(12% 0 0);
  --action-primary-fg:oklch(99% 0 0);
  --border-default:oklch(85% 0 0);
  --space-1:4px;--space-2:8px;--space-4:16px;--space-8:32px;--space-12:48px;--space-16:64px;
  --radius-sm:2px;--radius-md:4px;
  --font-sans:"Inter Variable",Inter,system-ui,-apple-system,"Segoe UI","Noto Sans KR",sans-serif;
  --text-sm:14px;--text-base:16px;--text-lg:20px;--text-xl:28px;--text-2xl:40px;
}
@media (prefers-color-scheme: dark){
  :root{
    --surface-base:oklch(12% 0 0);
    --surface-muted:oklch(30% 0 0);
    --text-default:oklch(99% 0 0);
    --text-muted:oklch(85% 0 0);
    --action-primary:oklch(99% 0 0);
    --action-primary-fg:oklch(12% 0 0);
    --border-default:oklch(30% 0 0);
  }
}
/* ── base ── */
*{box-sizing:border-box}
body{
  margin:0;background:var(--surface-base);color:var(--text-default);
  font-family:var(--font-sans);font-size:var(--text-base);line-height:1.75;
  font-weight:400;word-break:keep-all;
}
.container{max-width:960px;margin:0 auto;padding:0 var(--space-4)}
h1,h2{font-weight:500;letter-spacing:-0.02em;text-wrap:balance;line-height:1.3}
h1{font-size:var(--text-xl);margin:0}
h2{font-size:var(--text-lg);margin:0 0 var(--space-4)}
a{color:inherit}
button{font:inherit}
/* ── header ── */
header{padding:var(--space-8) 0 var(--space-4);border-bottom:1px solid var(--border-default)}
header .sub{color:var(--text-muted);font-size:var(--text-sm);margin-top:var(--space-1)}
/* ── search ── */
.search{padding:var(--space-12) 0 var(--space-8)}
.search form{display:flex;gap:var(--space-2);align-items:flex-end}
.search input[type=text]{
  flex:1;border:0;border-bottom:1px solid var(--border-default);
  background:transparent;color:inherit;padding:var(--space-2) 0;font-size:var(--text-lg);
  border-radius:0;outline:none;transition:border-color 150ms ease-out;
}
.search input[type=text]:focus{border-bottom:2px solid var(--text-default);margin-bottom:-1px}
.btn{
  height:40px;padding:0 24px;border-radius:var(--radius-sm);border:1px solid transparent;
  background:var(--action-primary);color:var(--action-primary-fg);cursor:pointer;
  transition:opacity 150ms ease-out;font-weight:500;
}
.btn:hover{opacity:.85}
.btn:focus-visible{outline:2px solid var(--text-default);outline-offset:2px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.secondary{background:transparent;color:inherit;border:1px solid var(--border-default)}
.chips{display:flex;gap:var(--space-2);margin-top:var(--space-4);flex-wrap:wrap}
.chip{
  padding:var(--space-1) var(--space-4);border:1px solid var(--border-default);
  border-radius:var(--radius-sm);background:transparent;color:var(--text-muted);cursor:pointer;
  transition:all 150ms ease-out;font-size:var(--text-sm);
}
.chip:hover,.chip:focus-visible{border-color:var(--text-default);color:var(--text-default);outline:none}
.chip[aria-pressed="true"]{background:var(--action-primary);color:var(--action-primary-fg);border-color:var(--action-primary)}
.parsed{color:var(--text-muted);font-size:var(--text-sm);margin-top:var(--space-2);min-height:1.5em}
/* ── map ── */
.map-wrap{border:1px solid var(--border-default);border-radius:var(--radius-sm);overflow:hidden}
#map{height:380px;width:100%}
.map-empty{
  height:380px;display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);background:var(--surface-muted);text-align:center;padding:var(--space-4);
}
/* ── results ── */
.results{padding:var(--space-8) 0 var(--space-16)}
.card{
  border:1px solid var(--border-default);border-radius:var(--radius-sm);
  padding:var(--space-8);margin-bottom:var(--space-4);
}
.card .head{display:flex;justify-content:space-between;align-items:baseline;gap:var(--space-2)}
.card .name{font-size:var(--text-lg);font-weight:500;letter-spacing:-0.02em}
.card .cat{color:var(--text-muted);font-size:var(--text-sm)}
.card .menus{margin:var(--space-2) 0 0;padding:0;list-style:none}
.card .menus li{display:flex;justify-content:space-between;gap:var(--space-2);padding:var(--space-1) 0}
.card .menus .price{font-variant-numeric:tabular-nums;color:var(--text-muted)}
.card .addr{color:var(--text-muted);font-size:var(--text-sm);margin-top:var(--space-2)}
.empty{
  border:1px solid var(--border-default);border-radius:var(--radius-sm);
  padding:var(--space-8);color:var(--text-muted);text-align:center;
}
.section-label{
  font-size:var(--text-sm);color:var(--text-muted);text-transform:uppercase;
  letter-spacing:.08em;margin:0 0 var(--space-4);
}
footer{border-top:1px solid var(--border-default);padding:var(--space-8) 0 var(--space-12);color:var(--text-muted);font-size:var(--text-sm)}
footer a{text-decoration:underline;text-underline-offset:3px}
.icon{width:16px;height:16px;vertical-align:-2px;stroke:currentColor;fill:none;stroke-width:1.5}
</style>
</head>
<body>
<header>
  <div class="container">
    <h1>한입지도</h1>
    <p class="sub">예산 안에서 오늘 뭘 먹을지 — 학식과 명륜동·혜화 식당을 한 판에.</p>
  </div>
</header>

<section class="search">
  <div class="container">
    <form id="searchForm" role="search" aria-label="예산·조건 검색">
      <input type="text" id="q" placeholder="예: 8천원 이하 도보 5분 혼밥" autocomplete="off" aria-label="자연어 검색">
      <button class="btn" type="submit" id="goBtn">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        찾기
      </button>
    </form>
    <div class="chips" role="group" aria-label="예산 바로 선택">
      <button class="chip" type="button" data-budget="6000" aria-pressed="false">6천원 이하</button>
      <button class="chip" type="button" data-budget="8000" aria-pressed="false">8천원 이하</button>
      <button class="chip" type="button" data-budget="10000" aria-pressed="false">1만원 이하</button>
      <button class="chip" type="button" data-budget="" aria-pressed="false">전체</button>
    </div>
    <p class="parsed" id="parsed" aria-live="polite"></p>
  </div>
</section>

<section>
  <div class="container">
    <div class="map-wrap" id="mapWrap">
      <div class="map-empty" id="mapEmpty">지도를 불러오는 중입니다.</div>
      <div id="map" hidden></div>
    </div>
  </div>
</section>

<section class="results">
  <div class="container">
    <p class="section-label" id="resultLabel">오늘의 선택지</p>
    <div id="cafeteriaBlock"></div>
    <div id="restaurantBlock"></div>
  </div>
</section>

<footer>
  <div class="container">
    메뉴판 사진에서 해방된 가격 데이터로 움직입니다 ·
    <a href="/test.html">사진 제보·파이프라인 검증 페이지</a>
  </div>
</footer>

<script>
const $ = (s) => document.querySelector(s);
let DATA = { restaurants: [], menus: [], cafeteria: [] };
let MAP = null, MARKERS = [];
let state = { budget: null, tags: [] };

/* ── 데이터 ── */
async function loadData() {
  try {
    const r = await fetch("/api/data");
    DATA = await r.json();
  } catch { DATA = { restaurants: [], menus: [], cafeteria: [], source: "none" }; }
  render();
  renderMarkers();
}

/* ── 지도 (카카오맵 JS — 키는 /api/config 런타임 주입, 없으면 graceful) ── */
async function loadMap() {
  let key = null;
  try { key = (await (await fetch("/api/config")).json()).kakaoJsKey; } catch {}
  if (!key) {
    $("#mapEmpty").textContent = "지도 키 등록 대기 중 — 목록으로 먼저 골라보세요.";
    return;
  }
  const s = document.createElement("script");
  s.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${key}&autoload=false`;
  s.onerror = () => { $("#mapEmpty").textContent = "지도를 불러오지 못했습니다 — 목록으로 골라보세요."; };
  s.onload = () => kakao.maps.load(() => {
    $("#mapEmpty").hidden = true;
    $("#map").hidden = false;
    MAP = new kakao.maps.Map($("#map"), { center: new kakao.maps.LatLng(37.5877, 126.9938), level: 4 });
    renderMarkers();
  });
  document.head.appendChild(s);
}
function renderMarkers() {
  if (!MAP || !window.kakao) return;
  MARKERS.forEach((m) => m.setMap(null)); MARKERS = [];
  for (const r of visibleRestaurants()) {
    if (!r.lat || !r.lng) continue;
    const marker = new kakao.maps.Marker({ map: MAP, position: new kakao.maps.LatLng(r.lat, r.lng), title: r.name });
    const iw = new kakao.maps.InfoWindow({ content: `<div style="padding:4px 8px;font-size:13px">${r.name}</div>` });
    kakao.maps.event.addListener(marker, "click", () => iw.open(MAP, marker));
    MARKERS.push(marker);
  }
}

/* ── 검색 ── */
$("#searchForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const q = $("#q").value.trim();
  if (!q) { render(); return; }
  $("#goBtn").disabled = true;
  $("#parsed").textContent = "조건을 읽는 중입니다…";
  try {
    const res = await fetch("/api/parse-query", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ query: q }),
    });
    const p = await res.json();
    state.budget = p.budget ?? null;
    state.tags = p.tags ?? [];
    const bits = [];
    if (state.budget) bits.push(`예산 ${state.budget.toLocaleString()}원 이하`);
    if (p.walkMax) bits.push(`도보 ${p.walkMax}분`);
    if (state.tags.length) bits.push(state.tags.join("·"));
    $("#parsed").textContent = bits.length ? `조건: ${bits.join(" / ")}` : "조건을 읽지 못했습니다 — 전체를 보여드립니다.";
    syncChips();
  } catch {
    $("#parsed").textContent = "조건 해석에 실패했습니다 — 전체를 보여드립니다.";
    state.budget = null; state.tags = [];
  }
  $("#goBtn").disabled = false;
  render(); renderMarkers();
});
document.querySelectorAll(".chip").forEach((c) => c.addEventListener("click", () => {
  state.budget = c.dataset.budget ? Number(c.dataset.budget) : null;
  $("#parsed").textContent = state.budget ? `조건: 예산 ${state.budget.toLocaleString()}원 이하` : "";
  syncChips(); render(); renderMarkers();
}));
function syncChips() {
  document.querySelectorAll(".chip").forEach((c) => {
    const b = c.dataset.budget ? Number(c.dataset.budget) : null;
    c.setAttribute("aria-pressed", String(b === state.budget));
  });
}

/* ── 렌더 ── */
function menusFor(rid) {
  return DATA.menus.filter((m) => m.restaurant_id === rid && (!state.budget || m.price <= state.budget));
}
function visibleRestaurants() {
  return DATA.restaurants.filter((r) => !state.budget || menusFor(r.id).length > 0);
}
function render() {
  const today = DATA.cafeteria.filter((c) => !state.budget || !c.price || c.price <= state.budget);
  $("#cafeteriaBlock").innerHTML = today.length
    ? `<div class="card"><div class="head"><span class="name">학식</span><span class="cat">성균관대 인사캠</span></div>
       <ul class="menus">${today.slice(-4).map((c) => `
         <li><span>${c.cafeteria}${c.corner ? " · " + c.corner : ""} <span class="cat">(${c.menu_date})</span><br>
         <span class="cat">${c.items.slice(0, 5).join(", ")}${c.items.length > 5 ? " 외" : ""}</span></span>
         <span class="price">${c.price ? c.price.toLocaleString() + "원" : ""}</span></li>`).join("")}
       </ul></div>`
    : "";
  const rs = visibleRestaurants();
  $("#restaurantBlock").innerHTML = rs.length
    ? rs.map((r) => {
        const ms = menusFor(r.id).sort((a, b) => a.price - b.price);
        return `<div class="card"><div class="head"><span class="name">${r.name}</span><span class="cat">${r.category}</span></div>
          <ul class="menus">${ms.slice(0, 5).map((m) => `<li><span>${m.name}</span><span class="price">${m.price.toLocaleString()}원</span></li>`).join("")}
          ${ms.length > 5 ? `<li><span class="cat">외 ${ms.length - 5}개</span><span></span></li>` : ""}</ul>
          ${r.address ? `<p class="addr">${r.address}</p>` : ""}</div>`;
      }).join("")
    : `<div class="empty">조건에 맞는 곳이 아직 없습니다. 예산을 조금 올리거나, 메뉴판 사진을 <a href="/test.html">제보</a>해 주세요.</div>`;
}

loadData();
loadMap();
</script>
</body>
</html>
